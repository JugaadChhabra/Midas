<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Shorts — Midas</title>
  <style>
    :root {
      --bg: #f7f7f8; --card: #fff; --line: #e6e6e9; --ink: #1c1c1e;
      --muted: #6b6b70; --accent: #2f6df6; --accent-ink: #fff;
    }
    * { box-sizing: border-box; }
    body {
      font: 14px/1.5 system-ui, sans-serif; color: var(--ink);
      background: var(--bg); max-width: 980px; margin: 0 auto; padding: 28px 16px 64px;
    }
    h1 { margin: 0 0 4px; font-size: 22px; }
    h2 { font-size: 16px; margin: 0; }
    .sub { color: var(--muted); margin: 0 0 20px; }

    .card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 16px; }
    .form-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 12px 16px; align-items: end; }
    label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .03em; }
    select, input[type=text] { width: 100%; font: inherit; padding: 8px 10px; border: 1px solid var(--line); border-radius: 7px; background: #fff; }
    select:focus, input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
    .form-actions { grid-column: 1 / -1; }
    button {
      font: inherit; font-weight: 600; cursor: pointer; padding: 8px 16px;
      border: 1px solid var(--accent); border-radius: 7px; background: var(--accent); color: var(--accent-ink);
    }
    button:disabled { opacity: .55; cursor: default; }
    button.ghost { background: #fff; color: var(--ink); border-color: var(--line); font-weight: 500; }

    .jobs-head { display: flex; align-items: center; justify-content: space-between; margin: 28px 0 10px; }
    .jobs-head .meta { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 12px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #bbb; }
    .dot.live { background: #19a463; animation: pulse 1.1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

    table { border-collapse: collapse; width: 100%; }
    thead th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); padding: 6px 10px; border-bottom: 1px solid var(--line); }
    tbody td { padding: 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
    tbody tr:hover { background: #fafafb; }
    td.id { font-variant-numeric: tabular-nums; color: var(--muted); }
    td.url a { color: var(--accent); text-decoration: none; word-break: break-all; }
    td.url a:hover { text-decoration: underline; }

    .pill { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; line-height: 1.5; white-space: nowrap; }
    .pill-CREATED, .pill-QUEUED, .pill-ONGOING { background: #eef2ff; color: #3a4ea8; }
    .pill-UPLOADING                            { background: #fff4e0; color: #95620a; }
    .pill-DONE, .pill-SUCCEEDED, .pill-UPLOADED{ background: #e6f6ec; color: #0a7a2f; }
    .pill-FAILED                               { background: #fdecea; color: #b00020; }
    .pill-PENDING, .pill                       { background: #eee; color: #555; }

    .clips { display: flex; flex-direction: column; gap: 6px; }
    .clip { display: flex; align-items: baseline; gap: 8px; font-size: 13px; }
    .clip .rank { color: var(--muted); font-variant-numeric: tabular-nums; min-width: 24px; }
    .clip .title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .clip a { color: var(--accent); text-decoration: none; }
    .clip a:hover { text-decoration: underline; }
    .clip .err { color: #b00020; font-size: 12px; }
    .err-cell { color: #b00020; font-size: 12px; white-space: pre-wrap; word-break: break-word; max-width: 240px; }
    .empty { color: var(--muted); }

    .banner { display: none; margin: 14px 0 0; padding: 10px 12px; border-radius: 8px; border: 1px solid; font-size: 13px; }
    .banner.error   { background: #fdecea; border-color: #f5c6c0; color: #8b1a13; }
    .banner.success { background: #e8f5ec; border-color: #b6dcc0; color: #0a5a25; }
    .banner pre { margin: 6px 0 0; padding: 8px; background: rgba(0,0,0,.05); border-radius: 4px; font-size: 12px; white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <h1>Shorts</h1>
  <p class="sub">Pick a channel, paste a YouTube URL, generate shorts via WayinVideo, auto-upload as <b>private</b>.</p>

  <div class="card">
    <div class="form-grid">
      <div>
        <label for="channel">Channel</label>
        <select id="channel"></select>
      </div>
      <div>
        <label for="url">YouTube URL</label>
        <input type="text" id="url" placeholder="https://www.youtube.com/watch?v=..." />
      </div>
      <div class="form-actions">
        <button id="generate">Generate shorts</button>
      </div>
    </div>
    <div id="banner" class="banner"></div>
  </div>

  <div class="jobs-head">
    <h2>Jobs</h2>
    <div class="meta">
      <span class="dot" id="poll-dot"></span>
      <span id="poll-status">—</span>
      <button class="ghost" id="refresh">Refresh</button>
    </div>
  </div>

  <table id="jobs">
    <thead><tr><th>ID</th><th>Channel</th><th>Source</th><th>Status</th><th>Error</th><th>Clips</th></tr></thead>
    <tbody></tbody>
  </table>

<script>
const POLL_MS = 10000;
const banner = document.getElementById('banner');
const tbody = document.querySelector('#jobs tbody');
const pollDot = document.getElementById('poll-dot');
const pollStatus = document.getElementById('poll-status');

// jobId -> { tr, html } so we only mutate the DOM when a row's content changes.
const rows = new Map();
let polling = false;
let timer = null;

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

function pill(status) {
  const s = status || 'PENDING';
  return `<span class="pill pill-${escapeHtml(s)}">${escapeHtml(s)}</span>`;
}

function showBanner(kind, title, detail) {
  banner.className = 'banner ' + kind;
  banner.style.display = 'block';
  banner.innerHTML = `<b>${escapeHtml(title)}</b>` + (detail ? `<pre>${escapeHtml(detail)}</pre>` : '');
}
function hideBanner() { banner.style.display = 'none'; }

async function describeError(r) {
  let detail = '';
  try {
    const body = await r.json();
    detail = typeof body.detail === 'string' ? body.detail : JSON.stringify(body.detail ?? body, null, 2);
  } catch {
    try { detail = await r.text(); } catch { detail = ''; }
  }
  return { status: r.status, statusText: r.statusText, detail };
}

async function loadChannels() {
  const r = await fetch('/auth/channels');
  if (!r.ok) {
    const e = await describeError(r);
    showBanner('error', `Couldn't load channels (HTTP ${e.status} ${e.statusText})`, e.detail);
    return;
  }
  const channels = await r.json();
  const sel = document.getElementById('channel');
  sel.innerHTML = '';
  for (const c of channels) {
    const o = document.createElement('option');
    o.value = c.id;
    o.textContent = (c.name || c.id) + ' (' + c.id + ')';
    sel.appendChild(o);
  }
}

function clipsHtml(clips) {
  if (!clips || !clips.length) return '<span class="empty">—</span>';
  const items = clips.map(c => {
    const link = c.yt_video_id
      ? `<a href="https://studio.youtube.com/video/${escapeHtml(c.yt_video_id)}/edit" target="_blank">open</a>`
      : (c.local_path ? `<span class="empty">local</span>` : '');
    const err = c.upload_error ? `<span class="err">${escapeHtml(c.upload_error)}</span>` : '';
    return `<div class="clip">
      <span class="rank">#${escapeHtml(c.rank)}</span>
      ${pill(c.upload_status)}
      <span class="title" title="${escapeHtml(c.title || '')}">${escapeHtml(c.title || '')}</span>
      ${link}${err}
    </div>`;
  }).join('');
  return `<div class="clips">${items}</div>`;
}

// Returns the inner-HTML for a job's <td>s. Identical input => identical string,
// so an unchanged row is never re-rendered (no flicker, no lost scroll/selection).
function jobRowHtml(j, clips) {
  return `
    <td class="id">${escapeHtml(j.id)}</td>
    <td>${escapeHtml(j.channel_id)}</td>
    <td class="url"><a href="${escapeHtml(j.source_url)}" target="_blank">${escapeHtml(j.source_url)}</a></td>
    <td>${pill(j.status)}</td>
    <td class="err-cell">${escapeHtml(j.error_message || '')}</td>
    <td>${clipsHtml(clips)}</td>`;
}

function renderJobs(jobs, clipsById) {
  const seen = new Set();
  jobs.forEach((j, i) => {
    const html = jobRowHtml(j, clipsById[j.id] || []);
    let entry = rows.get(j.id);
    if (!entry) {
      const tr = document.createElement('tr');
      entry = { tr, html: null };
      rows.set(j.id, entry);
    }
    if (entry.html !== html) { entry.tr.innerHTML = html; entry.html = html; }
    // Keep DOM order in sync with the jobs array; insertBefore is a no-op if already placed.
    if (tbody.children[i] !== entry.tr) tbody.insertBefore(entry.tr, tbody.children[i] || null);
    seen.add(j.id);
  });
  for (const [id, entry] of rows) {
    if (!seen.has(id)) { entry.tr.remove(); rows.delete(id); }
  }
}

async function loadJobs() {
  if (polling) return;          // never overlap polls
  polling = true;
  pollDot.classList.add('live');
  pollStatus.textContent = 'updating…';
  try {
    const r = await fetch('/shorts/jobs');
    if (!r.ok) {
      const e = await describeError(r);
      showBanner('error', `Couldn't load jobs (HTTP ${e.status} ${e.statusText})`, e.detail);
      return;
    }
    const jobs = await r.json();
    // Fetch all per-job details in parallel instead of one-at-a-time.
    const details = await Promise.all(jobs.map(j =>
      fetch('/shorts/jobs/' + j.id).then(r => r.json()).catch(() => ({ clips: [] }))
    ));
    const clipsById = {};
    jobs.forEach((j, i) => { clipsById[j.id] = (details[i] && details[i].clips) || []; });
    renderJobs(jobs, clipsById);
    const t = new Date().toLocaleTimeString();
    pollStatus.textContent = `updated ${t}`;
  } catch (err) {
    pollStatus.textContent = 'update failed';
  } finally {
    polling = false;
    pollDot.classList.remove('live');
  }
}

document.getElementById('generate').addEventListener('click', async () => {
  hideBanner();
  const btn = document.getElementById('generate');
  const channel_id = document.getElementById('channel').value;
  const source_url = document.getElementById('url').value.trim();
  if (!channel_id || !source_url) {
    showBanner('error', 'Pick a channel and paste a YouTube URL first.');
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Submitting…';
  try {
    const r = await fetch('/shorts/jobs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ channel_id, source_url }),
    });
    if (!r.ok) {
      const e = await describeError(r);
      const titleByStatus = {
        404: 'Channel not found',
        503: 'WayinVideo is not configured',
        502: 'WayinVideo rejected the submission',
      };
      const title = (titleByStatus[e.status] || 'Submit failed') + ` (HTTP ${e.status})`;
      showBanner('error', title, e.detail);
      return;
    }
    const body = await r.json();
    showBanner('success',
      `Job #${body.job_id} submitted.`,
      `WayinVideo project: ${body.wayinvideo_project_id}\nPolling will start in ~15s. Watch the table below.`);
    document.getElementById('url').value = '';
    loadJobs();
  } catch (err) {
    showBanner('error', 'Network error while submitting', String(err));
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate shorts';
  }
});

document.getElementById('refresh').addEventListener('click', loadJobs);

function startPolling() { if (!timer) timer = setInterval(loadJobs, POLL_MS); }
function stopPolling() { clearInterval(timer); timer = null; }

// Pause polling while the tab is hidden; resume (and refresh immediately) on return.
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { stopPolling(); }
  else { loadJobs(); startPolling(); }
});

loadChannels();
loadJobs();
startPolling();
</script>
</body>
</html>
