<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Midas · Shorts</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
           max-width: 1100px; margin: 1.5rem auto; padding: 0 1.25rem; line-height: 1.5; }
    h1 { margin-bottom: .25rem; }
    h2 { font-size: 1rem; margin: 0; }
    .sub { opacity: .7; margin-top: 0; }
    .muted { opacity: .65; }

    /* Top nav */
    .nav { display:flex; align-items:center; gap:.4rem; padding:.5rem 0 .9rem; margin-bottom:.75rem; border-bottom:1px solid #8884; }
    .nav .brand { font-weight:700; font-size:1.05rem; text-decoration:none; color:inherit; margin-right:.6rem; }
    .nav a.navlink { text-decoration:none; color:inherit; padding:.3rem .75rem; border-radius:999px; font-size:.9rem; opacity:.7; }
    .nav a.navlink:hover { background:#8882; opacity:1; }
    .nav a.navlink.active { background:#6af2; color:#6af; opacity:1; font-weight:600; }

    .card { border: 1px solid #8884; border-radius: 10px; padding: 1.1rem 1.25rem; margin: 1rem 0; }
    .form-grid { display: grid; grid-template-columns: 1fr 2fr; gap: .75rem 1rem; align-items: end; }
    label { display: block; margin-bottom: .25rem; font-weight: 600; font-size: .72rem; opacity: .65; text-transform: uppercase; letter-spacing: .04em; }
    select, input[type=text] { width: 100%; font: inherit; padding: .45rem .55rem; border: 1px solid #8886; border-radius: 8px; background: transparent; color: inherit; }
    select:focus, input:focus { outline: none; border-color: #6af; }
    .form-actions { grid-column: 1 / -1; }
    button, .btn { font: inherit; padding: .5rem .9rem; border-radius: 8px; cursor: pointer;
                   border: 1px solid #8886; background: #fff1; color: inherit; text-decoration: none; display: inline-block; }
    button:hover, .btn:hover { background: #8882; }
    button:disabled { opacity: .5; cursor: default; }
    button.primary { border-color: #6af; color: #6af; font-weight: 600; }

    .jobs-head { display: flex; align-items: center; justify-content: space-between; margin: 1.75rem 0 .6rem; }
    .jobs-head .meta { display: flex; align-items: center; gap: .6rem; opacity: .65; font-size: .78rem; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #8886; }
    .dot.live { background: #2a7; animation: pulse 1.1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

    table { border-collapse: collapse; width: 100%; }
    thead th { text-align: left; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; opacity: .6; padding: .5rem .35rem; border-bottom: 1px solid #8883; }
    tbody td { padding: .6rem .35rem; border-bottom: 1px solid #8883; font-size: .92rem; vertical-align: top; }
    td.id { font-variant-numeric: tabular-nums; opacity: .6; }
    td.url a { color: #6af; text-decoration: none; word-break: break-all; }
    td.url a:hover { text-decoration: underline; }

    .pill { display: inline-block; padding: .15rem .55rem; border-radius: 999px; font-size: .78rem; font-weight: 600; line-height: 1.5; white-space: nowrap; }
    .pill-CREATED, .pill-QUEUED, .pill-ONGOING { background: #28a2; color: #6af; border: 1px solid #28a3; }
    .pill-UPLOADING                            { background: #d802; color: #d80; border: 1px solid #d803; }
    .pill-DONE, .pill-SUCCEEDED, .pill-UPLOADED{ background: #2a72; color: #2a7; border: 1px solid #2a73; }
    .pill-FAILED                               { background: #c332; color: #c33; border: 1px solid #c333; }
    .pill-PENDING, .pill                       { background: #8882; color: inherit; }

    .clips { display: flex; flex-direction: column; gap: 6px; }
    .clip { display: flex; align-items: baseline; gap: 8px; font-size: .88rem; }
    .clip .rank { opacity: .6; font-variant-numeric: tabular-nums; min-width: 24px; }
    .clip .title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .clip a { color: #6af; text-decoration: none; }
    .clip a:hover { text-decoration: underline; }
    .clip .err { color: #c33; font-size: .8rem; }
    .err-cell { color: #c33; font-size: .8rem; white-space: pre-wrap; word-break: break-word; max-width: 240px; }
    .empty { opacity: .55; }

    .banner { display: none; margin: 14px 0 0; padding: .7rem .9rem; border-radius: 8px; border: 1px solid; font-size: .88rem; }
    .banner.error   { background: #c332; border-color: #c334; color: #c33; }
    .banner.success { background: #2a72; border-color: #2a74; color: #2a7; }
    .banner pre { margin: 6px 0 0; padding: 8px; background: #0002; border-radius: 4px; font-size: 12px; white-space: pre-wrap; word-break: break-word; }

    .prog { width: 120px; height: 6px; background: #8882; border-radius: 3px; overflow: hidden; margin-bottom: 3px; }
    .prog-bar { height: 100%; background: #6af; transition: width .5s; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="brand">Midas</a>
    <a href="/" class="navlink">Dashboard</a>
    <a href="/shorts" class="navlink active">Shorts</a>
  </nav>
  <h1>Shorts</h1>
  <p class="sub">Pick a channel, paste a YouTube URL, cut shorts locally, auto-upload as <b>private</b>.</p>

  <div class="card">
    <div class="form-grid">
      <div>
        <label for="channel">Channel</label>
        <select id="channel"></select>
      </div>
      <div>
        <label for="url">YouTube URL</label>
        <input type="text" id="url" placeholder="https://www.youtube.com/watch?v=..." />
      </div>
      <div>
        <label for="cut-mode">Cut mode</label>
        <select id="cut-mode">
          <option value="highlights" selected>Highlights (best moments)</option>
          <option value="coverage">Full coverage (whole song)</option>
        </select>
      </div>
      <div>
        <label for="camera-motion">Camera motion</label>
        <select id="camera-motion">
          <option value="locked">Camera: locked</option>
          <option value="calm" selected>Camera: calm</option>
          <option value="follow">Camera: follow</option>
        </select>
      </div>
      <div class="form-actions">
        <button id="generate" class="primary">Generate shorts</button>
      </div>
    </div>
    <div id="banner" class="banner"></div>
  </div>

  <div class="jobs-head">
    <h2>Jobs</h2>
    <div class="meta">
      <span class="dot" id="poll-dot"></span>
      <span id="poll-status">—</span>
      <button class="ghost" id="refresh">Refresh</button>
    </div>
  </div>

  <table id="jobs">
    <thead><tr><th>ID</th><th>Channel</th><th>Source</th><th>Status</th><th>Error</th><th>Clips</th></tr></thead>
    <tbody></tbody>
  </table>

<script>
const POLL_MS = 10000;
const banner = document.getElementById('banner');
const tbody = document.querySelector('#jobs tbody');
const pollDot = document.getElementById('poll-dot');
const pollStatus = document.getElementById('poll-status');

// jobId -> { tr, html } so we only mutate the DOM when a row's content changes.
const rows = new Map();
let polling = false;
let timer = null;

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

function pill(status) {
  const s = status || 'PENDING';
  return `<span class="pill pill-${escapeHtml(s)}">${escapeHtml(s)}</span>`;
}

function showBanner(kind, title, detail) {
  banner.className = 'banner ' + kind;
  banner.style.display = 'block';
  banner.innerHTML = `<b>${escapeHtml(title)}</b>` + (detail ? `<pre>${escapeHtml(detail)}</pre>` : '');
}
function hideBanner() { banner.style.display = 'none'; }

async function describeError(r) {
  let detail = '';
  try {
    const body = await r.json();
    detail = typeof body.detail === 'string' ? body.detail : JSON.stringify(body.detail ?? body, null, 2);
  } catch {
    try { detail = await r.text(); } catch { detail = ''; }
  }
  return { status: r.status, statusText: r.statusText, detail };
}

async function loadChannels() {
  const r = await fetch('/auth/channels');
  if (!r.ok) {
    const e = await describeError(r);
    showBanner('error', `Couldn't load channels (HTTP ${e.status} ${e.statusText})`, e.detail);
    return;
  }
  const channels = await r.json();
  const sel = document.getElementById('channel');
  sel.innerHTML = '';
  for (const c of channels) {
    const o = document.createElement('option');
    o.value = c.id;
    o.textContent = (c.name || c.id) + ' (' + c.id + ')';
    sel.appendChild(o);
  }
}

function clipsHtml(clips) {
  if (!clips || !clips.length) return '<span class="empty">—</span>';
  const items = clips.map(c => {
    const link = c.yt_video_id
      ? `<a href="https://studio.youtube.com/video/${escapeHtml(c.yt_video_id)}/edit" target="_blank">open</a>`
      : (c.local_path ? `<span class="empty">local</span>` : '');
    const err = c.upload_error ? `<span class="err">${escapeHtml(c.upload_error)}</span>` : '';
    return `<div class="clip">
      <span class="rank">#${escapeHtml(c.rank)}</span>
      ${pill(c.upload_status)}
      <span class="title" title="${escapeHtml(c.title || '')}">${escapeHtml(c.title || '')}</span>
      ${link}${err}
    </div>`;
  }).join('');
  return `<div class="clips">${items}</div>`;
}

const WORKING = ['CREATED', 'DOWNLOADING', 'ANALYSING', 'RENDERING', 'UPLOADING'];
function progressCell(j) {
  if (!WORKING.includes(j.status)) return pill(j.status);
  const pct = Math.max(0, Math.min(100, j.progress || 0));
  return `<div class="prog"><div class="prog-bar" style="width:${pct}%"></div></div>` +
         `<small>${escapeHtml(j.progress_label || j.status.toLowerCase())} ${pct}%</small>`;
}

// Returns the inner-HTML for a job's <td>s. Identical input => identical string,
// so an unchanged row is never re-rendered (no flicker, no lost scroll/selection).
function jobRowHtml(j, clips) {
  return `
    <td class="id">${escapeHtml(j.id)}</td>
    <td>${escapeHtml(j.channel_id)}</td>
    <td class="url"><a href="${escapeHtml(j.source_url)}" target="_blank">${escapeHtml(j.source_url)}</a></td>
    <td>${progressCell(j)}</td>
    <td class="err-cell">${escapeHtml(j.error_message || '')}</td>
    <td>${clipsHtml(clips)}</td>`;
}

function renderJobs(jobs, clipsById) {
  const seen = new Set();
  jobs.forEach((j, i) => {
    const html = jobRowHtml(j, clipsById[j.id] || []);
    let entry = rows.get(j.id);
    if (!entry) {
      const tr = document.createElement('tr');
      entry = { tr, html: null };
      rows.set(j.id, entry);
    }
    if (entry.html !== html) { entry.tr.innerHTML = html; entry.html = html; }
    // Keep DOM order in sync with the jobs array; insertBefore is a no-op if already placed.
    if (tbody.children[i] !== entry.tr) tbody.insertBefore(entry.tr, tbody.children[i] || null);
    seen.add(j.id);
  });
  for (const [id, entry] of rows) {
    if (!seen.has(id)) { entry.tr.remove(); rows.delete(id); }
  }
}

async function loadJobs() {
  if (polling) return;          // never overlap polls
  polling = true;
  pollDot.classList.add('live');
  pollStatus.textContent = 'updating…';
  try {
    const r = await fetch('/shorts/jobs');
    if (!r.ok) {
      const e = await describeError(r);
      showBanner('error', `Couldn't load jobs (HTTP ${e.status} ${e.statusText})`, e.detail);
      return;
    }
    const jobs = await r.json();
    // Fetch all per-job details in parallel instead of one-at-a-time.
    const details = await Promise.all(jobs.map(j =>
      fetch('/shorts/jobs/' + j.id).then(r => r.json()).catch(() => ({ clips: [] }))
    ));
    const clipsById = {};
    jobs.forEach((j, i) => { clipsById[j.id] = (details[i] && details[i].clips) || []; });
    renderJobs(jobs, clipsById);
    const t = new Date().toLocaleTimeString();
    pollStatus.textContent = `updated ${t}`;
  } catch (err) {
    pollStatus.textContent = 'update failed';
  } finally {
    polling = false;
    pollDot.classList.remove('live');
  }
}

document.getElementById('generate').addEventListener('click', async () => {
  hideBanner();
  const btn = document.getElementById('generate');
  const channel_id = document.getElementById('channel').value;
  const source_url = document.getElementById('url').value.trim();
  if (!channel_id || !source_url) {
    showBanner('error', 'Pick a channel and paste a YouTube URL first.');
    return;
  }
  const ytPattern = /youtube\.com\/watch|youtube\.com\/shorts\/|youtu\.be\//;
  if (!ytPattern.test(source_url)) {
    showBanner('error', 'Invalid YouTube URL. Please paste a youtube.com/watch, youtube.com/shorts/, or youtu.be/ link.');
    return;
  }
  const cut_mode = document.getElementById('cut-mode').value;
  const camera_motion = document.getElementById('camera-motion').value;
  btn.disabled = true;
  btn.textContent = 'Submitting…';
  try {
    const r = await fetch('/shorts/jobs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ channel_id, source_url, cut_mode, camera_motion }),
    });
    if (!r.ok) {
      const e = await describeError(r);
      const titleByStatus = {
        400: 'That is not a YouTube video link',
        404: 'Channel not found',
        409: 'A shorts job is already running',
      };
      const title = (titleByStatus[e.status] || 'Submit failed') + ` (HTTP ${e.status})`;
      showBanner('error', title, e.detail);
      return;
    }
    const body = await r.json();
    showBanner('success',
      `Job #${body.job_id} submitted.`,
      `Cutting has started. Watch the progress bar in the table below.`);
    document.getElementById('url').value = '';
    loadJobs();
  } catch (err) {
    showBanner('error', 'Network error while submitting', String(err));
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate shorts';
  }
});

document.getElementById('refresh').addEventListener('click', loadJobs);

function startPolling() { if (!timer) timer = setInterval(loadJobs, POLL_MS); }
function stopPolling() { clearInterval(timer); timer = null; }

// Pause polling while the tab is hidden; resume (and refresh immediately) on return.
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { stopPolling(); }
  else { loadJobs(); startPolling(); }
});

loadChannels();
loadJobs();
startPolling();
</script>
</body>
</html>
