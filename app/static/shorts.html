<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Midas · Shorts</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
           max-width: 1100px; margin: 1.5rem auto; padding: 0 1.25rem; line-height: 1.5;
           -webkit-font-smoothing: antialiased; }
    h1 { margin-bottom: .2rem; font-size: 1.6rem; letter-spacing: -.01em; }
    h2 { font-size: 1rem; margin: 0; }
    .sub { opacity: .65; margin-top: 0; text-wrap: pretty; }
    .muted { opacity: .6; }

    /* Top nav */
    .nav { display:flex; align-items:center; gap:.4rem; padding:.5rem 0 .9rem; margin-bottom:.75rem; border-bottom:1px solid #8883; }
    .nav .brand { font-weight:700; font-size:1.05rem; text-decoration:none; color:inherit; margin-right:.6rem; }
    .nav a.navlink { text-decoration:none; color:inherit; padding:.3rem .75rem; border-radius:999px; font-size:.9rem; opacity:.7; }
    .nav a.navlink:hover { background:#8882; opacity:1; }
    .nav a.navlink.active { background:#6af2; color:#6af; opacity:1; font-weight:600; }

    button, .btn { font: inherit; padding: .5rem .9rem; border-radius: 8px; cursor: pointer;
                   border: 1px solid #8886; background: #8881; color: inherit; text-decoration: none;
                   display: inline-block; transition: background .12s, transform .08s, border-color .12s; }
    button:hover, .btn:hover { background: #8883; }
    button:active, .btn:active { transform: scale(.97); }
    button:disabled { opacity: .5; cursor: default; transform: none; }
    .btn-sm { padding: .2rem .55rem; font-size: .8rem; border-radius: 6px; }

    .jobs-head { display: flex; align-items: baseline; justify-content: space-between; margin: 2rem 0 .5rem; }
    .jobs-head .left { display:flex; align-items:baseline; gap:.55rem; }
    .jobs-head .count { font-size:.78rem; opacity:.5; font-variant-numeric: tabular-nums; }
    .jobs-head .meta { display: flex; align-items: center; gap: .55rem; opacity: .6; font-size: .76rem; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #8886; flex:none; }
    .dot.live { background: #2a7; animation: pulse 1.1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

    table { border-collapse: collapse; width: 100%; table-layout: fixed; }
    col.c-job  { width: 12%; }
    col.c-src  { width: 20%; }
    col.c-stat { width: 30%; }
    col.c-clip { width: 38%; }
    thead th { text-align: left; font-size: .68rem; text-transform: uppercase; letter-spacing: .05em; opacity: .5; padding: .5rem .5rem; border-bottom: 1px solid #8883; font-weight: 600; }
    tbody td { padding: .7rem .5rem; border-bottom: 1px solid #8882; font-size: .92rem; vertical-align: top; }
    tbody tr:hover { background: #8881; }

    /* Job cell: id leads, channel name is the muted second line. */
    .job-id { font-variant-numeric: tabular-nums; font-weight: 600; }
    .job-chan { font-size: .76rem; opacity: .55; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Source: compact single-line video link, never char-wraps. */
    .src { display: inline-flex; align-items: center; gap: .3rem; max-width: 100%; color: #6af;
           text-decoration: none; font-size: .86rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .src:hover { text-decoration: underline; }
    .src .vid { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

    .pill { display: inline-block; padding: .13rem .55rem; border-radius: 999px; font-size: .76rem; font-weight: 600; line-height: 1.5; white-space: nowrap; }
    .pill-CREATED, .pill-QUEUED, .pill-ONGOING, .pill-DOWNLOADING, .pill-ANALYSING, .pill-RENDERING { background: #28a2; color: #6af; }
    .pill-UPLOADING                            { background: #d802; color: #d80; }
    .pill-DONE, .pill-SUCCEEDED, .pill-UPLOADED{ background: #2a72; color: #2a7; }
    .pill-FAILED                               { background: #c332; color: #c33; }
    .pill-PENDING, .pill                       { background: #8882; color: inherit; opacity:.85; }

    /* Status cell: failed reason folds into a native disclosure — one line by default,
       expandable to the full message. No more row-height explosions. */
    .reason { margin-top: .4rem; font-size: .8rem; }
    .reason > summary { color: #c33; cursor: pointer; list-style: none; max-width: 100%;
                        overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .reason > summary::-webkit-details-marker { display: none; }
    .reason > summary::before { content: "▸ "; opacity: .7; }
    .reason[open] > summary { white-space: normal; }
    .reason[open] > summary::before { content: "▾ "; }
    .reason pre { margin: .4rem 0 0; padding: .5rem .6rem; background: #0002; border-radius: 6px;
                  font-size: .78rem; white-space: pre-wrap; word-break: break-word; color: #c33; }

    .prog { width: 130px; height: 6px; background: #8882; border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
    .prog-bar { height: 100%; background: #6af; transition: width .5s; }
    .prog-label { font-size: .78rem; opacity: .7; }

    /* Clips: rank · status · title · action, each on one tidy line. */
    .clips { display: flex; flex-direction: column; gap: 7px; }
    .clip { display: flex; align-items: center; gap: 8px; font-size: .88rem; }
    .clip .rank { opacity: .5; font-variant-numeric: tabular-nums; min-width: 22px; flex: none; }
    .clip .pill { flex: none; }
    .clip .title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .clip .act { flex: none; }
    .clip a.open { color: #6af; text-decoration: none; font-size: .84rem; }
    .clip a.open:hover { text-decoration: underline; }
    .clip .cliperr { color: #c33; font-size: .78rem; }
    .empty { opacity: .5; }
    .empty-row td { text-align: center; padding: 2.5rem .5rem; opacity: .6; }

    .banner { display: none; margin: 14px 0 0; padding: .7rem .9rem; border-radius: 8px; border: 1px solid; font-size: .88rem; }
    .banner.error   { background: #c332; border-color: #c334; color: #c33; }
    .banner.success { background: #2a72; border-color: #2a74; color: #2a7; }
    .banner pre { margin: 6px 0 0; padding: 8px; background: #0002; border-radius: 4px; font-size: 12px; white-space: pre-wrap; word-break: break-word; }

    @media (max-width: 640px) {
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tbody td { border: none; padding: .2rem .5rem; }
      tbody tr { border-bottom: 1px solid #8883; padding: .6rem 0; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="brand">Midas</a>
    <a href="/" class="navlink">Dashboard</a>
    <a href="/shorts" class="navlink active">Shorts</a>
  </nav>
  <h1>Shorts</h1>
  <p class="sub">Shorts are cut from each channel’s own videos — a video’s <b>Make shorts</b> button on the dashboard, or autopilot — and auto-upload as <b>private</b> to that same channel. Track jobs and publish leftover clips here.</p>

  <div id="banner" class="banner"></div>

  <div class="jobs-head">
    <div class="left"><h2>Jobs</h2><span class="count" id="job-count"></span></div>
    <div class="meta">
      <span class="dot" id="poll-dot"></span>
      <span id="poll-status">—</span>
      <button class="btn-sm" id="refresh">Refresh</button>
    </div>
  </div>

  <table id="jobs">
    <colgroup>
      <col class="c-job" /><col class="c-src" /><col class="c-stat" /><col class="c-clip" />
    </colgroup>
    <thead><tr><th>Job</th><th>Source</th><th>Status</th><th>Clips</th></tr></thead>
    <tbody></tbody>
  </table>

<script>
const POLL_MS = 10000;
const banner = document.getElementById('banner');
const tbody = document.querySelector('#jobs tbody');
const pollDot = document.getElementById('poll-dot');
const pollStatus = document.getElementById('poll-status');
const jobCount = document.getElementById('job-count');

// channel id -> display name, so the table shows names not raw UC… ids.
const channelNames = new Map();
// jobId -> { tr, html } so we only mutate the DOM when a row's content changes.
const rows = new Map();
let polling = false;
let timer = null;

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

function pill(status) {
  const s = status || 'PENDING';
  return `<span class="pill pill-${escapeHtml(s)}">${escapeHtml(s)}</span>`;
}

function showBanner(kind, title, detail) {
  banner.className = 'banner ' + kind;
  banner.style.display = 'block';
  banner.innerHTML = `<b>${escapeHtml(title)}</b>` + (detail ? `<pre>${escapeHtml(detail)}</pre>` : '');
}
function hideBanner() { banner.style.display = 'none'; }

async function describeError(r) {
  let detail = '';
  try {
    const body = await r.json();
    detail = typeof body.detail === 'string' ? body.detail : JSON.stringify(body.detail ?? body, null, 2);
  } catch {
    try { detail = await r.text(); } catch { detail = ''; }
  }
  return { status: r.status, statusText: r.statusText, detail };
}

// Channel names label the jobs table. Cuts are started from the dashboard or
// autopilot (which upload to the source video's own channel), so this page
// intentionally has no channel picker or arbitrary-URL cut form.
async function loadChannels() {
  const r = await fetch('/auth/channels');
  if (!r.ok) {
    const e = await describeError(r);
    showBanner('error', `Couldn't load channel names (HTTP ${e.status} ${e.statusText})`, e.detail);
    return;
  }
  const channels = await r.json();
  for (const c of channels) channelNames.set(c.id, c.name || c.id);
}

// Pull a watch id out of whatever URL shape the job stored.
function videoId(j) {
  if (j.source_video_id) return j.source_video_id;
  const u = j.source_url || '';
  const m = u.match(/(?:v=|youtu\.be\/|\/shorts\/)([A-Za-z0-9_-]{6,})/);
  return m ? m[1] : '';
}

function sourceCell(j) {
  const vid = videoId(j);
  const href = escapeHtml(j.source_url || (vid ? `https://youtu.be/${vid}` : '#'));
  const label = vid ? `<span class="vid">${escapeHtml(vid)}</span>` : escapeHtml(j.source_url || '—');
  return `<a class="src" href="${href}" target="_blank" rel="noopener" title="${escapeHtml(j.source_url || '')}">▶ ${label}</a>`;
}

const WORKING = ['CREATED', 'DOWNLOADING', 'ANALYSING', 'RENDERING', 'UPLOADING'];
function statusCell(j) {
  if (WORKING.includes(j.status)) {
    const pct = Math.max(0, Math.min(100, j.progress || 0));
    return `<div class="prog"><div class="prog-bar" style="width:${pct}%"></div></div>` +
           `<div class="prog-label">${escapeHtml(j.progress_label || j.status.toLowerCase())} · ${pct}%</div>`;
  }
  let html = pill(j.status);
  if (j.status === 'FAILED' && j.error_message) {
    const msg = String(j.error_message);
    html += `<details class="reason"><summary>${escapeHtml(msg)}</summary><pre>${escapeHtml(msg)}</pre></details>`;
  }
  return html;
}

function clipsHtml(clips) {
  if (!clips || !clips.length) return '<span class="empty">—</span>';
  const items = clips.map(c => {
    const st = c.upload_status || 'PENDING';
    let act = '';
    if (c.yt_video_id) {
      act = `<a class="open" href="https://studio.youtube.com/video/${escapeHtml(c.yt_video_id)}/edit" target="_blank" rel="noopener">open ↗</a>`;
    } else if (st === 'PENDING' || st === 'FAILED') {
      act = `<button class="btn btn-sm" data-upload-clip="${escapeHtml(c.id)}">Upload</button>`;
    } else if (c.local_path) {
      act = `<span class="empty">local</span>`;
    }
    const err = c.upload_error ? `<span class="cliperr" title="${escapeHtml(c.upload_error)}">!</span>` : '';
    return `<div class="clip">
      <span class="rank">#${escapeHtml(c.rank)}</span>
      ${pill(st)}
      <span class="title" title="${escapeHtml(c.title || '')}">${escapeHtml(c.title || 'clip')}</span>
      ${err}<span class="act">${act}</span>
    </div>`;
  }).join('');
  return `<div class="clips">${items}</div>`;
}

// Identical input => identical string, so an unchanged row is never re-rendered
// (no flicker, no lost scroll, no collapsed <details>).
function jobRowHtml(j, clips) {
  const chan = channelNames.get(j.channel_id) || j.channel_id;
  return `
    <td><div class="job-id">#${escapeHtml(j.id)}</div><div class="job-chan" title="${escapeHtml(j.channel_id)}">${escapeHtml(chan)}</div></td>
    <td>${sourceCell(j)}</td>
    <td>${statusCell(j)}</td>
    <td>${clipsHtml(clips)}</td>`;
}

function renderJobs(jobs, clipsById) {
  jobCount.textContent = jobs.length ? `${jobs.length} job${jobs.length === 1 ? '' : 's'}` : '';
  const empty = tbody.querySelector('.empty-row');
  if (!jobs.length) {
    for (const [, e] of rows) e.tr.remove();
    rows.clear();
    if (!empty) tbody.innerHTML = `<tr class="empty-row"><td colspan="4">No jobs yet — paste a YouTube link above to cut your first short.</td></tr>`;
    return;
  }
  if (empty) empty.remove();
  const seen = new Set();
  jobs.forEach((j, i) => {
    const html = jobRowHtml(j, clipsById[j.id] || []);
    let entry = rows.get(j.id);
    if (!entry) {
      const tr = document.createElement('tr');
      entry = { tr, html: null };
      rows.set(j.id, entry);
    }
    if (entry.html !== html) { entry.tr.innerHTML = html; entry.html = html; }
    if (tbody.children[i] !== entry.tr) tbody.insertBefore(entry.tr, tbody.children[i] || null);
    seen.add(j.id);
  });
  for (const [id, entry] of rows) {
    if (!seen.has(id)) { entry.tr.remove(); rows.delete(id); }
  }
}

async function loadJobs() {
  if (polling) return;          // never overlap polls
  polling = true;
  pollDot.classList.add('live');
  pollStatus.textContent = 'updating…';
  try {
    const r = await fetch('/shorts/jobs');
    if (!r.ok) {
      const e = await describeError(r);
      showBanner('error', `Couldn't load jobs (HTTP ${e.status} ${e.statusText})`, e.detail);
      return;
    }
    const jobs = await r.json();
    const details = await Promise.all(jobs.map(j =>
      fetch('/shorts/jobs/' + j.id).then(r => r.json()).catch(() => ({ clips: [] }))
    ));
    const clipsById = {};
    jobs.forEach((j, i) => { clipsById[j.id] = (details[i] && details[i].clips) || []; });
    renderJobs(jobs, clipsById);
    pollStatus.textContent = `updated ${new Date().toLocaleTimeString()}`;
  } catch (err) {
    pollStatus.textContent = 'update failed';
  } finally {
    polling = false;
    pollDot.classList.remove('live');
  }
}

// Publish a single clip that the top-N cap (or a failure) left un-uploaded.
tbody.addEventListener('click', async (ev) => {
  const btn = ev.target.closest('[data-upload-clip]');
  if (!btn) return;
  const clipId = btn.getAttribute('data-upload-clip');
  hideBanner();
  btn.disabled = true;
  btn.textContent = 'Uploading…';
  try {
    const r = await fetch(`/shorts/clips/${clipId}/upload`, { method: 'POST' });
    if (!r.ok) {
      const e = await describeError(r);
      showBanner('error', `Upload failed (HTTP ${e.status})`, e.detail);
      btn.disabled = false;
      btn.textContent = 'Upload';
      return;
    }
    loadJobs();   // refresh — the clip flips to UPLOADED with an "open" link
  } catch (err) {
    showBanner('error', 'Network error while uploading', String(err));
    btn.disabled = false;
    btn.textContent = 'Upload';
  }
});

document.getElementById('refresh').addEventListener('click', loadJobs);

function startPolling() { if (!timer) timer = setInterval(loadJobs, POLL_MS); }
function stopPolling() { clearInterval(timer); timer = null; }

// Pause polling while the tab is hidden; resume (and refresh immediately) on return.
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { stopPolling(); }
  else { loadJobs(); startPolling(); }
});

loadChannels().then(loadJobs);
startPolling();
</script>
</body>
</html>
