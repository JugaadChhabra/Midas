<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Midas</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="/static/theme.css" />
<style>
  /* Page layout + widgets unique to the dashboard. Shared tokens and components
     live in /static/theme.css; every rule here consumes those tokens (no colour
     literals) so the dashboard's look can't drift from the other pages. */
  body { max-width: 1100px; margin: 2.5rem auto; padding: 0 1.25rem; }

  .freshness-ok { color:var(--color-ok); }
  .freshness-stale { color:var(--color-warn); }
  .freshness-old { color:var(--color-err); }
  .pace-bar { display:inline-block; width:80px; height:6px; background:var(--surface-tint); border-radius:3px; vertical-align:middle; overflow:hidden; }
  .pace-bar > i { display:block; height:100%; background:var(--color-ok); }

  /* Hero — the live "today / now" figures; the dashboard's focal point. */
  .hero { display:grid; grid-template-columns:repeat(auto-fit, minmax(190px, 1fr)); gap:.9rem; margin:1.1rem 0; }
  .hero-tile { border:1px solid var(--border); border-radius:var(--radius); padding:1.05rem 1.2rem; display:flex; flex-direction:column; }
  .hero-tile .hv { font-size:2.4rem; font-weight:800; line-height:1; letter-spacing:-.02em; }
  .hero-tile .hl { font-size:.78rem; font-weight:600; opacity:.7; text-transform:uppercase; letter-spacing:.05em; margin-top:.45rem; }
  .hero-tile .hsub { font-size:.75rem; opacity:.55; margin-top:.3rem; }

  /* Attention banner — shown only when something needs the operator. */
  .attention { border:1px solid var(--color-warn-border); background:var(--color-warn-bg); color:var(--color-warn);
               border-radius:var(--radius); padding:.7rem 1rem; margin:1rem 0; font-size:.9rem; }

  /* Mini pipeline bar in table */
  .mini-prog { display:flex; align-items:center; gap:.35rem; }
  .mini-track { width:48px; height:5px; background:var(--surface-tint); border-radius:3px; overflow:hidden; }
  .mini-fill  { height:100%; border-radius:3px; background:var(--color-accent); }

  /* Activity feed */
  .feed { display:flex; flex-direction:column; gap:.35rem; }
  .feed-item { display:flex; gap:.65rem; align-items:flex-start; font-size:.87rem;
               padding:.5rem .7rem; border-radius:7px; border:1px solid var(--surface-tint); }
  .feed-item .fbody { flex:1; }
  .feed-item .ftime { font-size:.74rem; opacity:.45; flex-shrink:0; white-space:nowrap; }
</style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="brand">Midas</a>
  </nav>
  <div style="display:flex; align-items:flex-end; justify-content:space-between; gap:1rem; flex-wrap:wrap;">
    <div>
      <h1 style="margin-bottom:.25rem">Midas</h1>
      <p class="sub">YouTube metadata audit + write-back. Autopilot ready.</p>
    </div>
  </div>

  <!-- Attention banner — only rendered when a channel needs the operator -->
  <div id="attention" class="attention" role="alert" hidden></div>

  <!-- Hero: live today / now figures — the focal point -->
  <div class="hero" id="hero" aria-live="polite">Loading…</div>

  <!-- Channels -->
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:.5rem;">
      <h3 style="margin:0">Connected channels</h3>
      <a class="btn" href="/auth/login">+ Connect channel</a>
    </div>
    <div id="channels" style="margin-top:.5rem">Loading…</div>
  </div>

  <!-- Activity feed -->
  <div class="card">
    <h3 style="margin-top:0; font-size:.95rem;">Recent activity</h3>
    <div class="feed" id="activity-feed" aria-live="polite" role="log"><span class="muted">Loading…</span></div>
  </div>

<script src="/static/swr.js"></script>
<script src="/static/status.js"></script>
<script>
const $ = (id) => document.getElementById(id);
const fmt = (n) => (n ?? 0).toLocaleString();
const signed = (n) => (n > 0 ? '+' : '') + fmt(n ?? 0);
const escapeHtml = (s) => (s ?? '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function freshnessClass(hours) {
  if (hours == null) return 'freshness-old';
  if (hours < 6) return 'freshness-ok';
  if (hours < 24) return 'freshness-stale';
  return 'freshness-old';
}
function freshnessText(hours) {
  if (hours == null) return 'never';
  if (hours < 1) return Math.round(hours * 60) + ' min ago';
  if (hours < 48) return Math.round(hours) + 'h ago';
  return Math.round(hours / 24) + 'd ago';
}
function autopilotPill(c) {
  if (c.autopilot_paused_reason) return `<span class="pill pill--err">Paused</span>`;
  if (c.autopilot_enabled) return `<span class="pill pill--ok">Running</span>`;
  return `<span class="pill pill--neutral">Off</span>`;
}
function pace(c) {
  const cap = c.autopilot_daily_cap || 0;
  if (!cap) return '';
  const pct = Math.max(0, Math.min(100, (c.applied_today / cap) * 100));
  return `<span class="muted" style="font-size:.78rem">${c.applied_today}/${cap}</span>
          <span class="pace-bar"><i style="width:${pct}%"></i></span>`;
}
function fmtResetTime(seconds) {
  if (seconds == null) return '';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  return `${h}h ${m}m`;
}

function renderDashboard(j) {
  renderHero(j);
  renderAttention(j.health);
  renderChannels(j.channels, j.pipeline);
  renderActivityFeed(j.activity || []);
}

// Stale-while-revalidate: paint the last dashboard instantly, then refresh in
// the background and repaint only if something changed. The 30s interval below
// reuses this, so each tick is a silent revalidate rather than a blank reload.
function loadDashboard() {
  SWR.swr('/dashboard', renderDashboard, {
    onError: () => {
      if (SWR.get('/dashboard') === undefined) {
        $('channels').innerHTML = '<em style="color:var(--color-err)">Failed to load. Is Supabase configured?</em>';
      }
    },
  });
}

// Absolute clock time (viewer's IST) when YouTube's daily quota resets, derived
// from the seconds-until-reset the server sends. Lets the operator plan around
// the midnight-Pacific reset in local terms.
function quotaResetIST(seconds) {
  if (seconds == null) return '';
  const at = new Date(Date.now() + seconds * 1000);
  return at.toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit', hour12: true }) + ' IST';
}

// The four live figures the dashboard leads with — each a "right now / today"
// operational number. Cumulative totals live on each channel's Overview page.
function renderHero(j) {
  const q = j.quota || {}, k = j.kpis || {};
  const remPct = q.remaining / Math.max(1, (q.limit - q.safety_buffer));
  const qColor = remPct > 0.3 ? 'var(--color-ok)' : remPct > 0.1 ? 'var(--color-warn)' : 'var(--color-err)';
  const qVal = q.remaining < 0 ? `${fmt(-q.remaining)} over` : fmt(q.remaining);
  const jobs = k.jobs_running ?? 0;
  $('hero').innerHTML = `
    <div class="hero-tile">
      <div class="hv" style="color:${qColor}">${qVal}</div>
      <div class="hl">YouTube quota left</div>
      <div class="hsub">resets in ${fmtResetTime(q.reset_in_seconds)} · ${quotaResetIST(q.reset_in_seconds)}</div>
    </div>
    <div class="hero-tile">
      <div class="hv">${fmt(k.shorts_cut_today)}</div>
      <div class="hl">Shorts cut today</div>
    </div>
    <div class="hero-tile">
      <div class="hv">${fmt(k.audited_today)}</div>
      <div class="hl">Videos audited today</div>
    </div>
    <div class="hero-tile">
      <div class="hv" style="color:${jobs > 0 ? 'var(--color-accent)' : 'inherit'}">${fmt(jobs)}</div>
      <div class="hl">Jobs running now</div>
      <div class="hsub">${jobs > 0 ? 'shorts cutting in progress' : 'idle'}</div>
    </div>`;
}

// Only surfaces when the operator needs to act — today, that's paused autopilot.
function renderAttention(h) {
  const el = $('attention');
  const paused = (h && h.autopilot_paused) || 0;
  if (paused > 0) {
    el.innerHTML = `<b>${paused} channel${paused > 1 ? 's' : ''} paused</b> — autopilot has stopped. Open the channel to see why and resume.`;
    el.hidden = false;
  } else {
    el.hidden = true;
  }
}

function renderChannels(list, pipeline) {
  if (!list || !list.length) { $('channels').innerHTML = '<em class="muted">No channels yet — connect one above.</em>'; return; }
  $('channels').innerHTML = `<table>
    <thead><tr>
      <th>Name</th><th>Handle</th><th>Pipeline</th><th>Applied 7d</th>
      <th>Δ views 7d</th><th>Autopilot</th><th>Synced</th><th></th>
    </tr></thead><tbody>` +
    list.map(c => {
      const totalVids = c.video_count || 0;
      // Exact per-channel audited count from /dashboard (audited_regular + audited_shorts).
      const audited = (c.audited_regular || 0) + (c.audited_shorts || 0);
      const touchedPct = totalVids > 0 ? Math.min(100, Math.round(audited / totalVids * 100)) : 0;
      return `<tr>
        <td><b>${escapeHtml(c.name || c.id)}</b>
            ${c.analytics_authorized ? '' : '<span class="pill pill--warn" style="margin-left:.4rem" title="Reconnect for analytics — Loop 0 polling is skipped">Reconnect for analytics</span>'}</td>
        <td class="muted">${escapeHtml(c.handle || '')}</td>
        <td>
          <div class="mini-prog" title="${audited} of ${totalVids} videos audited">
            <div class="mini-track"><div class="mini-fill" style="width:${touchedPct}%"></div></div>
            <span class="muted" style="font-size:.76rem">${touchedPct}%</span>
          </div>
          ${c.pending_count > 0 ? `<span class="pill pill--info" style="margin-top:.2rem;display:inline-block">${c.pending_count} pending</span>` : ''}
        </td>
        <td>${c.applied_7d}</td>
        <td class="${c.delta_views_7d > 0 ? 'pos' : c.delta_views_7d < 0 ? 'neg' : 'muted'}">${signed(c.delta_views_7d)}</td>
        <td>${autopilotPill(c)} ${pace(c)}</td>
        <td class="${freshnessClass(c.hours_since_sync)}">${freshnessText(c.hours_since_sync)}</td>
        <td><a class="btn" href="/channel?id=${encodeURIComponent(c.id)}" aria-label="Open channel ${escapeHtml(c.name || c.id)}">Open →</a></td>
      </tr>`;
    }).join('') + '</tbody></table>';
}

function renderActivityFeed(items) {
  if (!items.length) {
    $('activity-feed').innerHTML = '<span class="muted" style="font-size:.88rem">No recent activity.</span>';
    return;
  }
  $('activity-feed').innerHTML = items.map(item => {
    const ts = item.applied_at || item.created_at || '';
    const ago = ts ? timeAgo(ts) : '';
    const channelPart = item.channel_name ? `<span class="muted"> · ${escapeHtml(item.channel_name)}</span>` : '';
    return `<div class="feed-item">
      <div class="fbody">
        ${statusPill(item.status, 'audit', 'sm')}
        <b style="margin-left:.35rem">${escapeHtml(item.video_title || item.video_id)}</b>${channelPart}
      </div>
      <div class="ftime">${escapeHtml(ago)}</div>
    </div>`;
  }).join('');
}

function timeAgo(iso) {
  try {
    const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (diff < 60) return diff + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  } catch { return ''; }
}

loadDashboard();
// Poll only while the tab is visible. A backgrounded dashboard tab otherwise keeps
// triggering full videos+audits scans on the server (Supabase egress) for nothing;
// refresh immediately whenever the tab regains focus.
let dashTimer = null;
function startDashPolling() { if (!dashTimer) dashTimer = setInterval(loadDashboard, 30000); }
function stopDashPolling() { clearInterval(dashTimer); dashTimer = null; }
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { stopDashPolling(); }
  else { loadDashboard(); startDashPolling(); }
});
if (!document.hidden) startDashPolling();
</script>
</body>
</html>
