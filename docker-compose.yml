services:
  midas:
    image: ghcr.io/jugaadchhabra/midas:latest
    pull_policy: always
    container_name: midas
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CLIENT_SECRETS_FILE: /app/client_secret.json
      KEYFRAMES_LOCAL_DIR: /app/storage/keyframes
      BGUTIL_POT_HTTP_BASE_URL: http://bgutil-provider:4416
      SHORTS_CACHE_DIR: /app/shorts_cache
      LOG_DIR: /app/logs
    volumes:
      - ./client_secret.json:/app/client_secret.json:ro
      # Host bind mounts (not named volumes) so each job's artifacts stay
      # reachable from the host. If an upload dies on a YouTube quota hit, the
      # finished vertical master sits in ./shorts_cache/<channel>/tmp and the
      # run's log lands in ./logs — both survive a container prune.
      - ./storage:/app/storage
      - ./shorts_cache:/app/shorts_cache
      - ./logs:/app/logs
    depends_on:
      bgutil-provider:
        # Don't start midas (or let autopilot fire a shorts job) until the
        # PO-token sidecar is actually serving — plain "depends_on" only waits
        # for container start, which loses the startup race and fails downloads.
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5.0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  bgutil-provider:
    # Pinned to match the bgutil-ytdlp-pot-provider PLUGIN version baked into the
    # midas image (requirements-ml.txt). Server and plugin must be the same
    # version: a skew makes the server mint tokens the plugin can't consume, so
    # yt-dlp drops to a token-less client and YouTube lies "video not available".
    # `:latest` here let the always-pulled server drift ahead of the frozen
    # plugin — the exact cause of shorts downloads failing on long-lived hosts.
    # Bump this and the requirements-ml.txt pin together.
    image: brainicism/bgutil-ytdlp-pot-provider:1.3.1
    pull_policy: always
    container_name: bgutil-provider
    restart: unless-stopped
    # serves PO tokens on :4416 inside the compose network; no host port needed
    healthcheck:
      # node is the sidecar's own runtime, so it's always present — no reliance
      # on curl/wget being in the image. A plain /ping only proves the HTTP
      # server booted; it stays green while the provider hands back empty tokens
      # and yt-dlp silently drops to a token-less client (YouTube then lies
      # "video not available"). So the check actually MINTS: POST /get_pot and
      # require a non-empty poToken. `service_healthy` then genuinely gates midas
      # — a new machine/channel can't start jobs against a provider that can't
      # mint. First botguard solve is slow, hence the generous start_period.
      test: ["CMD", "node", "-e", "const http=require('http');const d='{}';const req=http.request({host:'127.0.0.1',port:4416,path:'/get_pot',method:'POST',headers:{'Content-Type':'application/json','Content-Length':d.length}},r=>{let b='';r.on('data',c=>b+=c);r.on('end',()=>{try{process.exit(r.statusCode===200&&JSON.parse(b).poToken?0:1)}catch(e){process.exit(1)}})});req.on('error',()=>process.exit(1));req.write(d);req.end();"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s
